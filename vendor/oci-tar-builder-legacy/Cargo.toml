[package]
name = "oci-tar-builder"
description = "Library that can be used to build OCI tar archives"
version = "0.4.0"
edition = "2021"
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/containerd/runwasi"
repository = "https://github.com/containerd/runwasi"

[dependencies]
tar = "0.4"
sha256 = "1.5.0"
log = "0.4"
oci-spec = { version = "0.6.7", features = ["runtime"] }
anyhow = "1.0"
serde = "1.0"
serde_json = "1.0"
clap = { version = "4.5.3", features = ["derive"] }
indexmap = "2.2.5"

[lib]
path = "src/lib.rs"

[[bin]]
name = "oci-tar-builder"
path = "src/bin.rs"
